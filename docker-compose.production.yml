version: '3.8'

services:
  eshopwebmvc:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__CatalogConnection=Server=sqlserver-prd,1433;uid=sa;Password=${SA_PASSWORD};Database=Microsoft.eShopOnWeb.CatalogDb;TrustServerCertificate=true;
      - ConnectionStrings__IdentityConnection=Server=sqlserver-prd,1433;uid=sa;Password=${SA_PASSWORD};Database=Microsoft.eShopOnWeb.Identity;TrustServerCertificate=true;
    ports:
      - "5107:8080"
    depends_on:
      sqlserver-prd:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - securefintech-prd

  sqlserver-prd:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
      - ACCEPT_EULA=Y
    volumes:
      - sqldata_production:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -Q 'SELECT 1' -No || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - securefintech-prd

volumes:
  sqldata_production:

networks:
  securefintech-prd:
    driver: bridge
