# ============================================================
# Pipeline CI/CD — SecureFintech eShopOnWeb
# Stack : .NET 10 / Docker / GitLab CI / VPS Hostinger
# ============================================================

stages:
  - build       # Compilation + tests
  - security    # Gitleaks + (SonarCloud optionnel)
  - docker      # Build image + push registry GitLab
  - deploy-staging    # Déploiement auto sur Staging
  - deploy-production # Déploiement manuel sur Production

variables:
  DOTNET_VERSION: "10.0"
  IMAGE_NAME: $CI_REGISTRY_IMAGE/eshopweb
  SOLUTION_FILE: "eShopOnWeb.sln"

# ────────────────────────────────────────────
# STAGE 1 — BUILD
# ────────────────────────────────────────────
build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet restore $SOLUTION_FILE
    - dotnet build $SOLUTION_FILE -c Release --no-restore
  artifacts:
    paths:
      - src/Web/bin/Release/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ────────────────────────────────────────────
# STAGE 1 — TESTS
# ────────────────────────────────────────────
test:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet restore $SOLUTION_FILE
    - dotnet test $SOLUTION_FILE -c Release --no-restore
        --logger "trx;LogFileName=results.trx"
        --results-directory ./test-results
  artifacts:
    paths:
      - "test-results/"
    expire_in: 1 week
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ────────────────────────────────────────────
# STAGE 2 — SÉCURITÉ : SCAN SECRETS (Gitleaks)
# ────────────────────────────────────────────
gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose --gitleaks-ignore-path .gitleaksignore
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

