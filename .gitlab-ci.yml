# ────────────────────────────────────────────
# STAGE 3 — BUILD IMAGE DOCKER + PUSH REGISTRY
# ────────────────────────────────────────────
docker-build:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
        -f src/Web/Dockerfile
        -t $IMAGE_NAME:$CI_COMMIT_SHA
        -t $IMAGE_NAME:latest
        .
    - docker push $IMAGE_NAME:$CI_COMMIT_SHA
    - docker push $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ────────────────────────────────────────────
# STAGE 4 — DÉPLOIEMENT STAGING (automatique)
# ────────────────────────────────────────────
deploy-staging:
  stage: deploy-staging
  image: alpine:latest
  environment:
    name: staging
    url: http://$VPS_HOST:5106
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
  script:
    # Préparer le dossier sur le VPS
    - ssh root@$VPS_HOST "mkdir -p /opt/securefintech/staging"
    # Copier le docker-compose de staging
    - scp docker-compose.staging.yml root@$VPS_HOST:/opt/securefintech/staging/
    # Déployer la nouvelle image
    - ssh root@$VPS_HOST "
        cd /opt/securefintech/staging &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        export IMAGE_NAME=$IMAGE_NAME &&
        export IMAGE_TAG=$CI_COMMIT_SHA &&
        export SA_PASSWORD=$SA_PASSWORD_STG &&
        docker-compose -f docker-compose.staging.yml pull &&
        docker-compose -f docker-compose.staging.yml up -d
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ────────────────────────────────────────────
# STAGE 5 — DÉPLOIEMENT PRODUCTION (manuel)
# ────────────────────────────────────────────
deploy-production:
  stage: deploy-production
  image: alpine:latest
  environment:
    name: production
    url: http://$VPS_HOST:5107
  when: manual  # ← APPROBATION MANUELLE REQUISE
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
  script:
    # Préparer le dossier sur le VPS
    - ssh root@$VPS_HOST "mkdir -p /opt/securefintech/production"
    # Copier le docker-compose de production
    - scp docker-compose.production.yml root@$VPS_HOST:/opt/securefintech/production/
    # Déployer la nouvelle image
    - ssh root@$VPS_HOST "
        cd /opt/securefintech/production &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        export IMAGE_NAME=$IMAGE_NAME &&
        export IMAGE_TAG=$CI_COMMIT_SHA &&
        export SA_PASSWORD=$SA_PASSWORD_PRD &&
        docker-compose -f docker-compose.production.yml pull &&
        docker-compose -f docker-compose.production.yml up -d
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
